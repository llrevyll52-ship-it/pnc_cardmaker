<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNC Card Maker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app">
        <section class="preview-panel">
            <div class="preview-wrap">
                <div class="card-canvas" id="cardCanvas">
                    <img class="layer frame" src="cardmaker/08-frame/L1-frame.png" alt="">
                    <img class="layer title-layer" src="cardmaker/07-title/L4-title.png" alt="">

                    <div class="name-group" id="nameGroup">
                        <img class="name-left" src="cardmaker/06-name/L9-name_L.png" alt="">
                        <img class="name-line" id="nameLine" src="cardmaker/06-name/L8-name_line.png" alt="">
                        <img class="name-right" id="nameRight" src="cardmaker/06-name/L7-name_R.png" alt="">
                        <div class="name-text" id="nameText">NOAH</div>
                    </div>
                </div>
            </div>
        </section>

        <section class="control-panel">
            <h1>PNC Card Maker</h1>

            <label>
                이름
                <input type="text" id="nameInput" value="NOAH">
            </label>

            <button id="downloadBtn" type="button">PNG 저장</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
