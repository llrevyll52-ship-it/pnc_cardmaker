<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNC Card Maker</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app">

        <div class="preview-panel">

            <div class="card-canvas" id="cardCanvas">

                <!-- 캐릭터 이미지 / 최하단 -->
                <div class="character-layer" id="characterLayer"></div>

                <!-- 08. 메인프레임 / 배경 -->
                <img class="layer frame-layer" src="cardmaker/08-frame/L1-frame.png" alt="">

                <!-- 07. 타이틀 로고 -->
                <img class="layer title-layer" src="cardmaker/07-title/L4-title.png" alt="">

                <!-- 06. 이름 -->
                <img class="name-right-layer" id="nameRight" src="cardmaker/06-name/L7-name_R.png" alt="">

                <!-- frame_line / 이름 위 -->
                <img class="layer frame-line-layer" src="cardmaker/07-title/L3-frame_line.png" alt="">

                <!-- 05. 제공 클래스 -->
                <img class="layer class-layer" src="cardmaker/05-class/L5-class.png" alt="">

                <!-- 04. 요구 조건 -->
                <img class="layer condition-layer" src="cardmaker/04-condition/L6-condition.png" alt="">

                <!-- 03. 결합 능력 우 -->
                <img class="layer combine-right-layer" src="cardmaker/03-combine_R/L3-combine_R.png" alt="">

                <!-- 02. 결합 능력 좌 -->
                <img class="layer combine-left-layer" src="cardmaker/02-combine_L/L2-combine_L.png" alt="">

                <!-- 01. 강제 능력 / 최상단 -->
                <img class="layer force-layer" src="cardmaker/01-force/L1-force.png" alt="">

            </div>

        </div>

        <div class="control-panel">

            <h1>PNC CARD MAKER</h1>

            <div class="tool-tip">
                카드 이름 자동 조절 테스트
            </div>

            <div class="section-title">
                Main Card
            </div>

            <div class="input-group">
                <label for="nameInput">이름</label>
                <input id="nameInput" type="text" value="이즈" maxlength="6">
            </div>

            <button id="downloadBtn" class="primary-button">
                PNG 저장
            </button>

        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
